version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: pinchtab-detector
    main: ./main.go
    binary: pinchtab-detector
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - Merge pull request
      - Merge branch

release:
  github:
    owner: helixar-ai
    name: pinchtab-detector
  name_template: "{{.ProjectName}} {{.Version}}"
  header: |
    ## pinchtab-detector {{.Version}}

    Point-in-time scanner for PinchTab deployment and agentic browser bridge artifacts.
    Published by [Helixar Labs](https://helixar.ai/about/labs/).
